; ===========================================================
; CONFIGURACION DEL SISTEMA DE IMPRESION - EDITAR ANTES DE INSTALAR
; ===========================================================
; Completa estos valores ANTES de ejecutar instalar.bat (Windows)
; o instalar.sh (Linux). Si necesitas cambiarlos despues de instalar,
; edita este archivo y luego ejecuta reiniciar.bat / reiniciar.sh
; para aplicar los cambios (no hace falta reinstalar todo).

[server]
; URL del servidor WebSocket del backend (Django/Channels).
; Local:      ws://192.168.1.XXX:8000/ws/raspberry/
; Produccion: wss://api.tudominio.com/ws/raspberry/
url = ws://192.168.1.245:8000/ws/raspberry/

; API Key del dispositivo (se genera en el panel admin del backend)
api_key = IJ_SMCNqyWqAX_sSRFzpNARuO10_PZ9nuGEZ1obvERo

[device]
; ID de la sucursal (branch) en el sistema
branch_id = 1

; ID unico del dispositivo (se genera en el panel admin)
device_id = a3ddf64d-6e3b-42C

[updates]
; Auto-actualizacion de websocket_client.py desde GitHub.
; auto_update = si   -> revisa periodicamente y actualiza solo (recomendado
;                       para sucursales con el codigo estandar).
; auto_update = no   -> esta sucursal tiene codigo de impresion personalizado,
;                       NUNCA se sobreescribe automaticamente.
auto_update = si

; URL "raw" del archivo websocket_client.py en GitHub (rama/branch que quieras seguir).
source_url = https://raw.githubusercontent.com/TU_USUARIO/TU_REPO/main/websocket_client.py

; Cada cuantos minutos revisar si hay una version nueva
check_interval_minutes = 30
